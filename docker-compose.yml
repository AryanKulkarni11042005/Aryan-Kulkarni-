services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: portfolio-backend:latest
    restart: unless-stopped
    expose:
      - "4000"
    networks:
      - portfolio

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: portfolio-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - portfolio

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    image: portfolio-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
